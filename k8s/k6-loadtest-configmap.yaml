apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-loadtest-script
data:
  loadtest.js: |
    import http from 'k6/http'
    import { sleep, check } from 'k6'
    
    export const options = {
      stages: [
        { duration: '30s', target: 10 },
        { duration: '2m', target: 10 },
        { duration: '30s', target: 50 },
        { duration: '2m', target: 50 },
        { duration: '30s', target: 200 },
        { duration: '2m', target: 200 },
        { duration: '30s', target: 0 }
      ],
    };
    
    export default function () { 
      const url = 'http://metricflow:8080/api/metrics'
      const payload = JSON.stringify({
        metric_name: 'cpu_usage',
        metric_type: 'gauge',
        measured_at: new Date().toISOString(),
        val: Math.random() * 100,
        labels: Object.fromEntries(Array.from({length: 50}, (_, i) => [`key_${i}`, `value_${i}_${Math.random()}`]))})
      const params = { headers: { 'Content-Type': 'application/json' }, tags: { endpoint: 'ingest' } };

      const res = http.post(url, payload, params)

      check(res, {
        'status 202 accepted': (r) => r.status === 202,
        'status 503 shed':     (r) => r.status === 503,
      })

      sleep(.5)
    }
---