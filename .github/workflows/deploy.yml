name: Deploy Application

on:
    push:
        branches:
            - main

permissions:
    contents: read
    id-token: write
    security-events: write

env:
    AWS_REGION: us-east-2

jobs: 
  build-scan-push:
    runs-on: ubuntu-latest
    outputs: 
      image: ${{ steps.build.outputs.image }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::333207082767:role/github-actions-metricflow
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5

      - name: Build Docker image
        id: build
        run: |
              IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/metricflow:${{ github.sha }}"
              docker build -t "$IMAGE_URI" .
              echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
              echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT
              
      - name: "Trivy Scan: report LOW/MEDIUM"
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_URI }}
          severity: 'LOW,MEDIUM'
          exit-code: '0'
          format: 'table'

      - name: "Trivy scan: report HIGH/CRITICAL"
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_URI }}
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-results.sarif'
          limit-severities-for-sarif: true
          skip-setup-trivy: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        with:
          sarif_file: 'trivy-results.sarif'
          
      - name: Push image to ECR
        run: docker push "$IMAGE_URI"

  deploy:
    runs-on: ubuntu-latest
    needs: build-scan-push
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::333207082767:role/github-actions-metricflow
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4.0.1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name jml-eks --region us-east-2

      - name: Replace placeholder
        run: sed -i "s|__IMAGE__|${{ needs.build-scan-push.outputs.image }}|g" k8s/metricflow-deployment.yaml

      - name: Apply
        run: kubectl apply -f k8s/metricflow-deployment.yaml

      - name: Rollout status
        run: kubectl rollout status deployment/metricflow --timeout=5m