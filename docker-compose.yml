services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: metricflowUser
      POSTGRES_PASSWORD: metricflow1
      POSTGRES_DB: metricflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metricflowUser -d metricflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s